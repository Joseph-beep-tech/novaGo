server {
    listen 3002;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api → whatsapp-service /service (mirrors vite dev proxy)
    location /api/ {
        proxy_pass http://whatsapp-service:3001/service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy /auth → whatsapp-service /service/auth (session-cookie OIDC flow)
    location /auth/ {
        proxy_pass http://whatsapp-service:3001/service/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
    }

    # Proxy socket.io with WebSocket upgrade
    location /socket.io/ {
        proxy_pass http://whatsapp-service:3001/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # SPA fallback — all non-file routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
