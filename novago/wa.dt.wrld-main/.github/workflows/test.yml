name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Type check (service)
        run: npm run type-check -w packages/whatsapp-service

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Test (service)
        run: npm test -w packages/whatsapp-service
        env:
          MONGODB_URI: mongodb://localhost:27017/whatsapp-test
          API_KEY: test-ci-key
